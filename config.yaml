apply_form:
  first_name: Alex
  last_name: Granovsky
  email: compfaculty@gmail.com
  phone: 0523292110
  # CV path can use forward slashes (works on Windows) or relative path from project root
  #  cv_path: c:\Users\compf\projects\jf\data\Senior_Automation_Engineer_Alex_Granovsky.pdf
  cv_path: data/Senior_Automation_Engineer_Alex_Granovsky.pdf
  agree_tos: true
  forward_to_headhunters: true

cv_roles:
  - DevOps
  - Developer
  - Software Engineer
  - Backend Developer
  - DevOps Engineer
  - Automation Engineer

# Skills/keywords that define "relevance" for you
good_keywords:
  - backend
  - developer
  - engineer
  - automation
  - qa
  - devops
  - python
  - go
  - golang
  - linux
  - docker
  - kubernetes
  - k8s
  - ci/cd
  - microservice

# Keywords that should negatively impact or exclude jobs
bad_keywords:
  - receptionist
  - office manager
  - sales
  - hr
  - accounting
  - janitor
  - chef
  - frontend
  - js
  - react
  - javascript

# Optional hints for role inference if cv_roles* not specified
role_hints:
  - DevOps
  - Developer
  - Software Engineer
  - Backend Developer
  - Automation Engineer

cv_profile: |
  Senior Software/DevOps/Automation Engineer with production experience in Python, Go, Linux,
  containers, Kubernetes, CI/CD, and cloud. Strong backend and infra focus; comfortable with microservices,
  observability, and test automation at scale.

# Heuristic thresholds (tune as needed)
heuristic_threshold: 0.095
strong_threshold: 0.50
llm_model: gpt-4o-mini
llm_enabled: True
hard_exclude_on_bad: True

debug: false

browser_pool:
  headless: false
  workers: 4
  queue: 256
  nav_wait: 1200ms
  nav_timeout: 25s

mail:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: youruser@gmail.com
  smtp_pass: your-app-password
  from_name: Alex Granovsky
  from_email: youruser@gmail.com
  bcc: me@mydomain.com
  default_cv: /home/alex/cv/cv_general.pdf
  profiles:
    - name: backend
      patterns: [ "backend", "golang", "go developer", "server", "api", "full-stack" ]
      cv_path: /home/alex/cv/cv_backend.pdf
    - name: devops
      patterns: [ "devops", "sre", "platform", "kubernetes", "k8s", "terraform", "infra" ]
      cv_path: /home/alex/cv/cv_devops.pdf
    - name: security
      patterns: [ "security", "appsec", "pentest", "vuln", "red team" ]
      cv_path: /home/alex/cv/cv_security.pdf
    - name: data
      patterns: [ "data", "ml", "ai", "nlp", "analytics", "scientist", "engineer (data)" ]
      cv_path: /home/alex/cv/cv_data.pdf
