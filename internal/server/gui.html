<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Job Finder v2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
        }

        header {
            padding: 12px 16px;
            background: #111;
            color: #fff;
        }

        main {
            padding: 16px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .bar {
            height: 10px;
            background: #ddd;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .bar > div {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            transition: width .25s ease;
        }

        /* Dense, table-like list rows */
        .row {
            display: grid;
            grid-template-columns: 28px 2fr 1.6fr 1fr 2fr 110px; /* ☑ | title | company/location | age | short url | status */
            gap: 10px;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #3333;
        }

        .cell {
            min-width: 0;
        }

        .ellipsis {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title a {
            text-decoration: none;
        }

        .meta-sm {
            font-size: 12px;
            opacity: .85;
        }

        .right {
            text-align: right;
        }

        .row h4 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
        }

        .row p {
            margin: 0;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        button.primary {
            background: #4CAF50;
            color: #fff;
        }

        button.secondary {
            background: #333;
            color: #fff;
        }

        input[type="search"] {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: transparent;
            color: inherit;
        }

        .muted {
            opacity: .8;
            font-size: 12px;
        }

        .pager {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pager button {
            padding: 6px 10px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid #444;
        }

        .pill.applied {
            border-color: #2e7d32;
        }

        .pill.new {
            border-color: #555;
        }

        /* Hover card for full description */
        .preview-card {
            position: fixed;
            z-index: 9999;
            max-width: 520px;
            max-height: 380px;
            overflow: auto;
            padding: 12px 14px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(120, 120, 120, .35);
            pointer-events: none; /* don’t trap cursor */
            font-size: 13px;
            line-height: 1.35;
        }

        @media (prefers-color-scheme: dark) {
            .preview-card {
                background: rgba(30, 30, 30, .95);
                color: #eaeaea;
            }
        }

        @media (prefers-color-scheme: light) {
            .preview-card {
                background: rgba(255, 255, 255, .98);
                color: #111;
            }
        }

        .preview-card h5 {
            margin: 0 0 6px 0;
            font-size: 14px;
        }

        .preview-card p {
            margin: 0 0 8px 0;
        }

        .preview-card ul {
            margin: 0 0 8px 18px;
            padding: 0;
        }

        .preview-card code, .preview-card pre {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            background: rgba(127, 127, 127, .15);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* Responsive collapse */
        @media (max-width: 820px) {
            .row {
                grid-template-columns: 24px 1fr 1fr;
                grid-auto-rows: auto;
                row-gap: 6px;
            }

            .row .title {
                grid-column: 2 / -1;
            }

            .row .co-loc {
                grid-column: 2 / -1;
            }

            .row .age {
                grid-column: 2 / 3;
            }

            .row .surl {
                grid-column: 3 / -1;
            }

            .row .status {
                grid-column: 2 / -1;
                text-align: left;
            }

            .preview-card {
                max-width: 92vw;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
<header><strong>Job Finder v2</strong></header>
<main>
    <section>
        <div class="actions">
            <button id="scanBtn" class="primary">Scan</button>
            <div id="statusText" class="muted">Idle</div>
        </div>
        <div class="bar">
            <div id="barFill"></div>
        </div>
    </section>

    <section style="margin-top:20px;">
        <div class="actions" style="gap: 12px; flex-wrap: wrap;">
            <input id="q" type="search" placeholder="Search title/description/company/location..." spellcheck="false"
                   data-ms-editor="true"/>
            <button id="refreshBtn" class="secondary">Refresh</button>
            <button id="applyBtn" class="primary">Apply selected</button>
            <button id="deleteBtn" class="secondary">Delete selected</button>
            <span id="countText" class="muted"></span>
        </div>

        <div id="list"></div>

        <div class="pager">
            <button id="prevBtn" class="secondary">◀ Prev</button>
            <button id="nextBtn" class="secondary">Next ▶</button>
            <span id="pageInfo" class="muted"></span>
        </div>
    </section>
</main>

<script>
    const $ = s => document.querySelector(s);
    const scanBtn = $("#scanBtn");
    const statusText = $("#statusText");
    const barFill = $("#barFill");
    const list = $("#list");
    const q = $("#q");
    const refreshBtn = $("#refreshBtn");
    const applyBtn = $("#applyBtn");
    const deleteBtn = $("#deleteBtn");
    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const pageInfo = $("#pageInfo");
    const countText = $("#countText");

    let pollTimer = null;
    let limit = 25;
    let offset = 0;
    let total = 0;

    // Abort controller to cancel in-flight jobs queries (prevents race conditions while typing)
    let jobsAbort = null;

    scanBtn.onclick = async () => {
        await fetch("/api/scan/start", {method: "POST"});
        statusText.textContent = "Starting scan...";
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(pollStatus, 600);
    };

    async function pollStatus() {
        const r = await fetch("/api/scan/status");
        const st = await r.json();
        barFill.style.width = (st.percent || 0) + "%";
        let txt = st.running ? `🔎 Scanning: ${st.percent}% (${st.found} new)` : `Idle: ${st.percent}% (${st.found} new)`;
        if (st.error) txt += ` — error: ${st.error}`;
        statusText.textContent = txt;
        if (!st.running && pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
            await loadJobs();
        }
    }

    refreshBtn.onclick = () => {
        offset = 0;
        loadJobs();
    };
    prevBtn.onclick = () => {
        offset = Math.max(0, offset - limit);
        loadJobs();
    };
    nextBtn.onclick = () => {
        if (offset + limit < total) {
            offset += limit;
            loadJobs();
        }
    };

    // --- Dynamic search-as-you-type (debounced) ---
    const debounce = (fn, ms = 250) => {
        let t;
        return (...args) => {
            clearTimeout(t);
            t = setTimeout(() => fn(...args), ms);
        };
    };

    // Update list as user types
    q.addEventListener("input", debounce(() => {
        offset = 0;
        loadJobs();
    }, 250));

    // Pressing Enter triggers immediate refresh
    q.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            offset = 0;
            loadJobs();
        }
    });

    async function loadJobs() {
        const params = new URLSearchParams();
        const qv = q.value.trim();
        if (qv) params.set("q", qv);
        params.set("limit", String(limit));
        params.set("offset", String(offset));

        // cancel previous request if any
        if (jobsAbort) jobsAbort.abort();
        jobsAbort = new AbortController();

        try {
            const r = await fetch("/api/jobs?" + params.toString(), {signal: jobsAbort.signal});
            const res = await r.json();
            total = res.total || 0;
            limit = res.limit || limit;
            offset = res.offset || offset;
            renderJobs(res.items || []);
            updatePager();
        } catch (err) {
            // Ignore aborted fetch errors
            if (err && err.name !== "AbortError") {
                console.error("loadJobs failed:", err);
            }
        }
    }

    function updatePager() {
        const page = Math.floor(offset / limit) + 1;
        const pages = Math.max(1, Math.ceil(total / limit));
        pageInfo.textContent = `Page ${page} / ${pages}`;
        countText.textContent = `Total: ${total}`;
        prevBtn.disabled = offset <= 0;
        nextBtn.disabled = offset + limit >= total;
    }

    function renderJobs(jobs) {
        list.innerHTML = "";
        if (!jobs.length) {
            list.innerHTML = `<p class="muted">No jobs yet.</p>`;
            return;
        }
        for (const j of jobs) {
            const applied = !!j.applied;
            const statusEmoji = applied ? "✅" : "🆕";
            const company = j.company_name || "";
            const loc = j.location || "";
            const url = j.url || "";
            const short = shortUrl(url, 36);
            const discovered = j.discovered_at ? new Date(j.discovered_at) : null;
            const when = discovered ? `${ago(discovered)} ago` : "";

            const descHTML = formatDesc(j.description || "");

            const row = document.createElement("div");
            row.className = "row";
            row.innerHTML = `
                <div class="cell">
                  <input type="checkbox" title="Select" data-id="${j.id}" ${applied ? "disabled" : ""}/>
                </div>
                <div class="cell title ellipsis">
                  <h4>${statusEmoji} <a href="${url}" target="_blank" rel="noopener" class="job-link">${escapeHtml(j.title || "(no title)")}</a></h4>
                </div>
                <div class="cell co-loc ellipsis meta-sm">
                  🏢 ${escapeHtml(company)} ${loc ? ` • 📍 ${escapeHtml(loc)}` : ""}
                </div>
                <div class="cell age meta-sm right" title="${discovered ? discovered.toLocaleString() : ""}">
                  🕒 ${when || ""}
                </div>
                <div class="cell surl ellipsis meta-sm">
                  🔗 <a href="${url}" target="_blank" rel="noopener" class="ellipsis">${escapeHtml(short)}</a>
                </div>
                <div class="cell status right">
                  ${applied ? `<span class="pill applied">Applied</span>` : `<span class="pill new">Not applied</span>`}
                </div>
            `;

            const link = row.querySelector(".job-link");
            attachPreview(link, {
                title: j.title || "(no title)",
                company,
                location: loc,
                descHTML
            });

            list.appendChild(row);
        }
    }

    applyBtn.onclick = async () => {
        const ids = selectedIDs();
        if (!ids.length) return;
        const r = await fetch("/api/apply", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ids})
        });
        const res = await r.json();
        await loadJobs();
        alert(`Applied to ${res.updated} job(s).`);
    };

    deleteBtn.onclick = async () => {
        const ids = selectedIDs(true);
        if (!ids.length) return;
        if (!confirm(`Delete ${ids.length} job(s)? This cannot be undone.`)) return;
        const r = await fetch("/api/jobs/delete", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ids})
        });
        const res = await r.json();
        await loadJobs();
        alert(`Deleted ${res.deleted} job(s).`);
    };

    function selectedIDs(includeApplied = false) {
        const boxes = [...document.querySelectorAll('input[type="checkbox"]')];
        const sel = [];
        for (const b of boxes) {
            if (b.checked || (includeApplied && b.disabled)) {
                const id = b.getAttribute("data-id");
                if (id) sel.push(id);
            }
        }
        return sel;
    }

    // ---------- Rich preview (hover card) ----------
    let previewEl = null;
    let hideTimer = null;

    function attachPreview(target, data) {
        target.addEventListener("mouseenter", e => showPreview(e, data));
        target.addEventListener("mousemove", e => movePreview(e));
        target.addEventListener("mouseleave", hidePreviewSoon);
        window.addEventListener("scroll", hidePreviewSoon, {passive: true});
    }

    function showPreview(e, {title, company, location, descHTML}) {
        clearTimeout(hideTimer);
        if (!previewEl) {
            previewEl = document.createElement("div");
            previewEl.className = "preview-card";
            document.body.appendChild(previewEl);
        }
        const heading = `<h5>${escapeHtml(title)}</h5>`;
        const meta = (company || location)
            ? `<p class="muted" style="opacity:.8;font-size:12px;margin-bottom:8px;">${escapeHtml(company)}${company && location ? " • " : ""}${escapeHtml(location)}</p>`
            : "";
        previewEl.innerHTML = heading + meta + descHTML;
        movePreview(e);
        previewEl.style.opacity = "1";
    }

    function movePreview(e) {
        if (!previewEl) return;
        const pad = 14;
        const vw = window.innerWidth, vh = window.innerHeight;
        const rect = previewEl.getBoundingClientRect();
        let x = e.clientX + pad, y = e.clientY + pad;

        if (x + rect.width + 10 > vw) x = e.clientX - rect.width - pad;
        if (y + rect.height + 10 > vh) y = e.clientY - rect.height - pad;
        if (x < 8) x = 8;
        if (y < 8) y = 8;

        previewEl.style.left = x + "px";
        previewEl.style.top = y + "px";
    }

    function hidePreviewSoon() {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            if (previewEl) previewEl.style.opacity = "0";
        }, 60);
    }

    // ---------- helpers ----------
    function shortUrl(u, max = 36) {
        if (!u) return "";
        try {
            const url = new URL(u);
            let text = url.host + url.pathname.replace(/\/+$/, "");
            if (!text) text = url.host;
            if (text.length > max) {
                const keep = Math.max(6, Math.floor(max * 0.55));
                const end = Math.max(8, max - keep - 1);
                text = text.slice(0, keep) + "…" + text.slice(-end);
            }
            return text;
        } catch {
            return u.length > max ? u.slice(0, max - 1) + "…" : u;
        }
    }

    function ago(d) {
        const s = Math.floor((Date.now() - d.getTime()) / 1000);
        if (s < 60) return `${s}s`;
        const m = Math.floor(s / 60);
        if (m < 60) return `${m}m`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h}h`;
        const days = Math.floor(h / 24);
        if (days < 30) return `${days}d`;
        const mo = Math.floor(days / 30);
        return `${mo}mo`;
    }

    function escapeHtml(s) {
        return (s || "").replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[m]));
    }

    function formatDesc(raw) {
        const esc = escapeHtml(raw).trim();
        if (!esc) return `<p class="muted">No description.</p>`;
        const blocks = esc.split(/\n{2,}/);
        const html = blocks.map(b => {
            const lines = b.split(/\n/).map(s => s.trim()).filter(Boolean);
            const allBullets = lines.length > 1 && lines.every(l => /^[-*•]\s*/.test(l));
            if (allBullets) {
                const li = lines.map(l => `<li>${l.replace(/^[-*•]\s*/, "")}</li>`).join("");
                return `<ul>${li}</ul>`;
            }
            return `<p>${lines.join("<br/>")}</p>`;
        }).join("");
        return html;
    }

    // initial load
    loadJobs();
</script>
</body>
</html>
