<!doctype html><html lang="en"><head><meta charset="utf-8"/><title>JobFinder</title><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0c0c0d;--bg2:#141416;--bg3:#1a1a1d;--fg:#f4f4f5;--fg2:#a1a1aa;--accent:#10b981;--accent2:#059669;--red:#ef4444;--border:#27272a;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
@media(prefers-color-scheme:light){:root{--bg:#fafafa;--bg2:#fff;--bg3:#f4f4f5;--fg:#18181b;--fg2:#71717a;--accent:#10b981;--accent2:#059669;--border:#e4e4e7;--shadow:0 4px 24px rgba(0,0,0,.08)}}
html,body{height:100%}body{font:400 14px/1.5 'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden}
::selection{background:var(--accent);color:#fff}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--fg2)}
a{color:inherit;text-decoration:none}button{font:inherit;cursor:pointer;border:none;background:none}input{font:inherit}
.hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.hdr h1{font-size:18px;font-weight:600;background:linear-gradient(135deg,var(--accent),#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sep{flex:1}.hdr-btn{padding:8px 16px;border-radius:8px;font-weight:500;font-size:13px;background:var(--bg3);color:var(--fg);border:1px solid var(--border);transition:all .15s}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}.hdr-btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.hdr-btn.pri:hover{background:var(--accent2)}
.wrap{display:flex;height:calc(100vh - 57px)}
.side{width:260px;background:var(--bg2);border-right:1px solid var(--border);padding:20px;overflow-y:auto;transition:transform .25s,width .25s;flex-shrink:0}
.side.hide{transform:translateX(-100%);width:0;padding:0;border:none}
.side h3{font-size:13px;font-weight:600;color:var(--fg2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.cv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:4px}
.cv-item:hover{background:var(--bg3)}.cv-item input{accent-color:var(--accent);width:16px;height:16px}
.cv-item span{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv-item input:checked+span{color:var(--accent);font-weight:500}
.cv-upload{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.cv-upload button{width:100%;padding:10px;border-radius:8px;background:var(--bg3);color:var(--fg);border:1px dashed var(--border);font-size:13px;transition:all .15s}
.cv-upload button:hover{border-color:var(--accent);color:var(--accent)}
.main{flex:1;padding:20px;overflow-y:auto}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:10px 14px 10px 38px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--fg);transition:border-color .15s}
.search input:focus{outline:none;border-color:var(--accent)}
.search::before{content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--fg2);font-size:16px}
.btn{padding:8px 14px;border-radius:8px;font-weight:500;font-size:13px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);transition:all .15s}
.btn:hover{border-color:var(--fg2)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}.btn.pri:hover{background:var(--accent2)}
.btn.red{color:var(--red);border-color:var(--red)}.btn.red:hover{background:var(--red);color:#fff}
.meta{font-size:12px;color:var(--fg2)}
.bar-wrap{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:12px 0}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#34d399);width:0;transition:width .3s}
.sel-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:13px;color:var(--fg2)}
.sel-row label{display:flex;align-items:center;gap:6px;cursor:pointer}.sel-row input{accent-color:var(--accent)}
.list{display:flex;flex-direction:column;gap:8px}
.job{display:grid;grid-template-columns:32px 1fr auto;gap:12px;align-items:start;padding:14px 16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);transition:all .15s}
.job:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.job input{margin-top:4px;accent-color:var(--accent);width:16px;height:16px}
.job-info h4{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.job-info h4 a{transition:color .15s}.job-info h4 a:hover{color:var(--accent)}
.job-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--fg2)}
.job-meta span{display:flex;align-items:center;gap:4px}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--bg3);border:1px solid var(--border)}
.pill.ok{color:var(--accent);border-color:var(--accent);background:rgba(16,185,129,.1)}
.pager{display:flex;gap:8px;align-items:center;margin-top:16px;justify-content:center}
.pager button{padding:8px 14px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--fg);font-size:13px;transition:all .15s}
.pager button:hover:not(:disabled){border-color:var(--accent)}.pager button:disabled{opacity:.3;cursor:not-allowed}
.pager span{font-size:13px;color:var(--fg2);padding:0 8px}
.toast{position:fixed;bottom:20px;right:20px;z-index:100;padding:14px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);max-width:340px;animation:slideIn .3s}
.toast h6{font-size:14px;font-weight:600;margin-bottom:2px}.toast p{font-size:13px;color:var(--fg2)}
.toast.err{border-color:var(--red)}.toast.err h6{color:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.preview{position:fixed;z-index:80;max-width:400px;max-height:300px;overflow:auto;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);pointer-events:none;opacity:0;transition:opacity .12s;font-size:13px;line-height:1.5}
.preview h5{font-size:14px;font-weight:600;margin-bottom:6px}.preview p{margin-bottom:8px;color:var(--fg2)}
.preview ul{margin:0 0 8px 16px;color:var(--fg2)}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skel 1.2s infinite;border-radius:6px;height:12px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.job.new{animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{opacity:0;transform:scale(.95) translateY(-10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@media(max-width:768px){.side{position:fixed;top:57px;left:0;height:calc(100vh - 57px);z-index:40;box-shadow:var(--shadow)}.job{grid-template-columns:28px 1fr}.job-right{display:none}}
.toggle{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;font-size:18px;transition:background .15s}.toggle:hover{background:var(--bg3)}
</style></head><body>
<header class="hdr"><button id="tog" class="toggle" title="Menu">☰</button><h1>JobFinder</h1><span class="sep"></span><button id="scanBtn" class="hdr-btn pri">▶ Scan</button></header>
<div class="wrap">
<aside id="side" class="side hide"><h3>Select CV</h3><div id="cvList"><label class="cv-item"><input type="radio" name="cv" value="" checked><span>Auto</span></label></div><div class="cv-upload"><input type="file" id="cvFile" accept=".pdf" hidden><button id="cvBtn">+ Upload CV</button></div></aside>
<main class="main">
<div class="toolbar"><div class="search"><input id="q" type="search" placeholder="Search jobs…" autocomplete="off" spellcheck="false"></div>
<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--fg2);cursor:pointer"><input type="checkbox" id="hideApp">Hide applied</label>
<select id="lim" class="btn" style="padding:8px 12px"><option value="10">10</option><option value="25" selected>25</option><option value="50">50</option><option value="100">100</option></select>
<button id="refBtn" class="btn">↻ Refresh</button></div>
<div id="status" class="meta">Ready</div>
<div class="bar-wrap"><div id="bar" class="bar-fill"></div></div>
<div class="sel-row"><label><input type="checkbox" id="selAll"><span>Select all</span></label><span id="selCnt">0 selected</span><span class="sep"></span><button id="appBtn" class="btn pri" disabled>Apply</button><button id="delBtn" class="btn red" disabled>Delete</button></div>
<div id="list" class="list"></div>
<div class="pager"><button id="prevBtn">← Prev</button><span id="pgInfo">Page 1</span><button id="nextBtn">Next →</button></div>
</main></div>
<div id="toast" class="toast" hidden><h6 id="tT"></h6><p id="tM"></p></div>
<script>
(function(){var $=function(s){return document.querySelector(s)},$$=function(s){return Array.from(document.querySelectorAll(s))},L=localStorage,D=document,B=document.body;
var tog=$('#tog'),side=$('#side'),q=$('#q'),lim=$('#lim'),bar=$('#bar'),list=$('#list'),status=$('#status'),scanBtn=$('#scanBtn'),refBtn=$('#refBtn'),prevBtn=$('#prevBtn'),nextBtn=$('#nextBtn'),pgInfo=$('#pgInfo'),selAll=$('#selAll'),selCnt=$('#selCnt'),appBtn=$('#appBtn'),delBtn=$('#delBtn'),hideApp=$('#hideApp'),cvList=$('#cvList'),cvFile=$('#cvFile'),cvBtn=$('#cvBtn'),toast=$('#toast'),tT=$('#tT'),tM=$('#tM');
var poll=null,sse=null,lmt=+L.getItem('jf.l')||25,off=0,tot=0,ab=null,cv=L.getItem('jf.cv')||'',esc={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function e(s){return(s||'').replace(/[&<>"']/g,function(m){return esc[m]})}
function msg(t,m,err){tT.textContent=t;tM.textContent=m;toast.className='toast'+(err?' err':'');toast.hidden=false;clearTimeout(toast._t);toast._t=setTimeout(function(){toast.hidden=true},3500)}
function json(u,o){return fetch(u,o).then(function(r){if(!r.ok)throw new Error(r.statusText);return r.headers.get('content-type')?.includes('json')?r.json():r.text()})}
if([10,25,50,100].indexOf(lmt)>=0)lim.value=lmt;else lmt=25;
tog.onclick=function(){side.classList.toggle('hide');L.setItem('jf.sc',side.classList.contains('hide')?'1':'0')};
if(L.getItem('jf.sc')!=='1')side.classList.remove('hide');
function loadCV(){json('/api/cv/list').then(function(r){var c=r.cvs||[];cvList.innerHTML='<label class="cv-item"><input type="radio" name="cv" value="" '+(cv?'':'checked')+'><span>Auto</span></label>';
c.forEach(function(x){var l=D.createElement('label');l.className='cv-item';l.innerHTML='<input type="radio" name="cv" value="'+e(x.path)+'" '+(cv===x.path?'checked':'')+'><span>'+e(x.filename)+'</span>';cvList.appendChild(l)});
$$('#cvList input').forEach(function(i){i.onchange=function(){cv=i.value;L.setItem('jf.cv',cv)}})}).catch(function(){})}
loadCV();
cvBtn.onclick=function(){cvFile.click()};
cvFile.onchange=function(){var f=cvFile.files[0];if(!f)return;if(!f.name.toLowerCase().endsWith('.pdf')){msg('Error','Only PDF files',1);return}
if(f.size>10485760){msg('Error','Max 10MB',1);return}
cvBtn.disabled=true;cvBtn.textContent='Uploading…';
var fd=new FormData();fd.append('file',f);
fetch('/api/cv/upload',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error();return r.json()}).then(function(d){msg('Uploaded',d.filename);loadCV();cv=d.path;L.setItem('jf.cv',cv)}).catch(function(){msg('Error','Upload failed',1)}).finally(function(){cvBtn.disabled=false;cvBtn.textContent='+ Upload CV';cvFile.value=''})};
scanBtn.onclick=function(){json('/api/scan/start',{method:'POST'}).then(function(){status.textContent='Scanning…';if(poll)clearInterval(poll);poll=setInterval(ps,600);openSSE();msg('Started','Scan running')}).catch(function(e){msg('Error',e.message||'Failed',1)})};
function openSSE(){if(sse)sse.close();if(off||q.value.trim()||hideApp.checked)return;
sse=new EventSource('/api/scan/stream');
sse.addEventListener('job_found',function(e){try{var j=JSON.parse(e.data);if(!off&&!q.value.trim()&&!hideApp.checked)addJob(j)}catch(x){}});
sse.addEventListener('scan_complete',function(e){try{var d=JSON.parse(e.data);closeSSE();load();msg('Done','Found '+d.total_found+' jobs')}catch(x){}});
sse.onerror=function(){if(!poll)closeSSE()}}
function closeSSE(){if(sse){sse.close();sse=null}}
function ps(){json('/api/scan/status').then(function(s){bar.style.width=s.percent+'%';status.textContent=s.running?'Scanning: '+s.percent+'% ('+s.found+' new)':'Idle';if(!s.running&&poll){clearInterval(poll);poll=null;closeSSE();load()}}).catch(function(){})}
lim.onchange=function(){lmt=+lim.value||25;L.setItem('jf.l',lmt);off=0;load()};
refBtn.onclick=function(){off=0;closeSSE();load()};
prevBtn.onclick=function(){off=Math.max(0,off-lmt);closeSSE();load()};
nextBtn.onclick=function(){if(off+lmt<tot){off+=lmt;closeSSE();load()}};
hideApp.onchange=function(){off=0;closeSSE();load()};
var dt=null;q.oninput=function(){clearTimeout(dt);dt=setTimeout(function(){off=0;closeSSE();load()},250)};
q.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();off=0;load()}};
function load(){selAll.checked=false;upd();skel();
var p=new URLSearchParams();if(q.value.trim())p.set('q',q.value.trim());if(hideApp.checked)p.set('hide_applied','true');p.set('limit',lmt);p.set('offset',off);
if(ab)ab.abort();ab=new AbortController();
json('/api/jobs?'+p,{signal:ab.signal}).then(function(r){tot=r.total||0;lmt=r.limit||lmt;off=r.offset||0;render(r.items||[]);pager()}).catch(function(e){if(e.name!=='AbortError'){msg('Error','Load failed',1);list.innerHTML='<p class="meta">Failed to load</p>'}})}
function pager(){var pg=Math.floor(off/lmt)+1,pgs=Math.max(1,Math.ceil(tot/lmt));pgInfo.textContent='Page '+pg+' / '+pgs+' ('+tot+' total)';prevBtn.disabled=off<=0;nextBtn.disabled=off+lmt>=tot}
function skel(){list.innerHTML='';for(var i=0;i<6;i++){var d=D.createElement('div');d.className='job';d.innerHTML='<div><div class="skel" style="width:16px;height:16px;border-radius:4px"></div></div><div><div class="skel" style="width:70%;margin-bottom:8px"></div><div class="skel" style="width:50%"></div></div><div></div>';list.appendChild(d)}}
function render(jobs){list.innerHTML='';if(!jobs.length){list.innerHTML='<p class="meta" style="text-align:center;padding:40px">No jobs found</p>';return}
var f=D.createDocumentFragment();for(var i=0;i<jobs.length;i++)f.appendChild(row(jobs[i]));list.appendChild(f)}
function row(j){var ok=!!j.applied,dt='';if(j.posted_at)try{dt=new Date(j.posted_at).toLocaleDateString()}catch(x){dt=j.posted_at}
var d=D.createElement('div');d.className='job';d.innerHTML='<div><input type="checkbox" data-id="'+j.id+'" '+(ok?'disabled':'')+' title="Select"></div><div class="job-info"><h4>'+(ok?'✓ ':'')+'<a href="'+(j.url||'#')+'" target="_blank" rel="noopener" class="jl">'+e(j.title||'(untitled)')+'</a></h4><div class="job-meta">'+(j.company_name?'<span>🏢 '+e(j.company_name)+'</span>':'')+(j.aggregator_name?'<span>📌 '+e(j.aggregator_name)+'</span>':'')+(dt?'<span>📅 '+e(dt)+'</span>':'')+'</div></div><div class="job-right"><span class="pill'+(ok?' ok':'')+'>'+(ok?'Applied':'New')+'</span></div>';
var lnk=d.querySelector('.jl'),cb=d.querySelector('input');
lnk.onmouseenter=function(ev){showPrev(ev,j)};lnk.onmousemove=movePrev;lnk.onmouseleave=hidePrev;
cb.onchange=upd;return d}
function addJob(j){var r=row(j);r.classList.add('new');var f=list.firstChild;if(f&&f.classList.contains('meta'))list.innerHTML='';list.insertBefore(r,list.firstChild);tot++;pager();upd();setTimeout(function(){r.classList.remove('new')},500)}
selAll.onchange=function(){$$('#list input[type="checkbox"]:not(:disabled)').forEach(function(b){b.checked=selAll.checked});upd()};
function upd(){var boxes=$$('#list input[type="checkbox"]'),en=boxes.filter(function(b){return!b.disabled}),ck=en.filter(function(b){return b.checked});
selCnt.textContent=ck.length+' selected';appBtn.disabled=!ck.length;delBtn.disabled=!ck.length&&!boxes.filter(function(b){return b.disabled}).length;
var all=en.length>0&&ck.length===en.length;selAll.indeterminate=ck.length>0&&!all;selAll.checked=all}
function ids(inc){var out=[];$$('#list input[type="checkbox"]').forEach(function(b){if(b.checked||(inc&&b.disabled)){var id=b.getAttribute('data-id');if(id)out.push(id)}});return out}
appBtn.onclick=function(){var i=ids();if(!i.length)return;
var body={ids:i};if(cv)body.cv_path=cv;
json('/api/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){load();msg('Applied','Updated '+(r.updated||i.length)+' job(s)')}).catch(function(e){msg('Error',e.message||'Failed',1)})};
delBtn.onclick=function(){var i=ids(true);if(!i.length)return;if(!confirm('Delete '+i.length+' job(s)?'))return;
json('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:i})}).then(function(r){load();msg('Deleted','Removed '+(r.deleted||i.length)+' job(s)')}).catch(function(e){msg('Error',e.message||'Failed',1)})};
var pv=null,ht=null;
function showPrev(ev,j){clearTimeout(ht);if(!pv){pv=D.createElement('div');pv.className='preview';B.appendChild(pv)}
var desc=fmtDesc(j.description||''),hr='';if(j.hr_email)hr+='<p style="color:var(--accent)">✉ '+e(j.hr_email)+'</p>';if(j.hr_phone)hr+='<p style="color:var(--accent)">☎ '+e(j.hr_phone)+'</p>';
pv.innerHTML='<h5>'+e(j.title||'')+'</h5>'+(j.company_name||j.location?'<p>'+e(j.company_name||'')+(j.company_name&&j.location?' • ':'')+e(j.location||'')+'</p>':'')+hr+desc;
movePrev(ev);pv.style.opacity='1'}
function movePrev(ev){if(!pv)return;var x=ev.clientX+14,y=ev.clientY+14,r=pv.getBoundingClientRect();if(x+r.width+10>innerWidth)x=ev.clientX-r.width-14;if(y+r.height+10>innerHeight)y=ev.clientY-r.height-14;if(x<8)x=8;if(y<8)y=8;pv.style.left=x+'px';pv.style.top=y+'px'}
function hidePrev(){clearTimeout(ht);ht=setTimeout(function(){if(pv)pv.style.opacity='0'},80)}
function fmtDesc(raw){var s=e(raw).trim();if(!s)return'<p style="color:var(--fg2)">No description</p>';var blocks=s.split(/\n{2,}/),html='';for(var i=0;i<blocks.length;i++){var lines=blocks[i].split(/\n/).map(function(l){return l.trim()}).filter(Boolean);if(lines.length>1&&lines.every(function(l){return/^[-*•]/.test(l)})){html+='<ul>'+lines.map(function(l){return'<li>'+l.replace(/^[-*•]\s*/,'')+'</li>'}).join('')+'</ul>'}else{html+='<p>'+lines.join('<br>')+'</p>'}}return html}
D.addEventListener('scroll',hidePrev,{passive:true});
D.addEventListener('keydown',function(ev){if(ev.key==='/'&&!/INPUT|TEXTAREA/.test(D.activeElement.tagName)){ev.preventDefault();q.focus()}});
load()})();
</script></body></html>
