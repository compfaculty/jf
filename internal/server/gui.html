<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Job Finder v2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
        }

        header {
            padding: 12px 16px;
            background: #111;
            color: #fff;
        }

        main {
            padding: 16px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .bar {
            height: 10px;
            background: #ddd;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .bar > div {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            transition: width .25s ease;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 12px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #3333;
        }

        .row h4 {
            margin: 0 0 6px 0;
        }

        .row p {
            margin: 0;
            opacity: .8;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        button.primary {
            background: #4CAF50;
            color: #fff;
        }

        button.secondary {
            background: #333;
            color: #fff;
        }

        input[type="search"] {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: transparent;
            color: inherit;
        }

        .muted {
            opacity: .8;
            font-size: 12px;
        }
    </style>
</head>
<body>
<header><strong>Job Finder v2</strong></header>
<main>
    <section>
        <div class="actions">
            <button id="scanBtn" class="primary">Scan</button>
            <div id="statusText" class="muted">Idle</div>
        </div>
        <div class="bar">
            <div id="barFill"></div>
        </div>
    </section>

    <section style="margin-top:20px;">
        <div class="actions">
            <input id="q" type="search" placeholder="Search title/description..."/>
            <button id="refreshBtn" class="secondary">Refresh</button>
            <button id="applyBtn" class="primary">Apply selected</button>
        </div>
        <div id="list"></div>
    </section>
</main>

<script>
    const $ = s => document.querySelector(s);
    const scanBtn = $("#scanBtn");
    const statusText = $("#statusText");
    const barFill = $("#barFill");
    const list = $("#list");
    const q = $("#q");
    const refreshBtn = $("#refreshBtn");
    const applyBtn = $("#applyBtn");

    let pollTimer = null;

    scanBtn.onclick = async () => {
        await fetch("/api/scan/start", {method: "POST"});
        statusText.textContent = "Starting scan...";
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(pollStatus, 600);
    };

    async function pollStatus() {
        const r = await fetch("/api/scan/status");
        const st = await r.json();
        barFill.style.width = (st.percent || 0) + "%";
        let txt = st.running ? `Scanning: ${st.percent}% (${st.found} new)` : `Idle: ${st.percent}% (${st.found} new)`;
        if (st.error) txt += ` — error: ${st.error}`;
        statusText.textContent = txt;
        if (!st.running && pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
            await loadJobs();
        }
    }

    refreshBtn.onclick = () => loadJobs();

    async function loadJobs() {
        const params = new URLSearchParams();
        if (q.value.trim()) params.set("q", q.value.trim());
        const r = await fetch("/api/jobs?" + params.toString());
        const jobs = await r.json();
        renderJobs(jobs);
    }

    function renderJobs(jobs) {
        list.innerHTML = "";
        if (!jobs.length) {
            list.innerHTML = `<p class="muted">No jobs yet.</p>`;
            return;
        }
        jobs.forEach(j => {
            const div = document.createElement("div");
            div.className = "row";
            div.innerHTML = `
      <div>
        <h4><a href="${j.url}" target="_blank" rel="noopener">${escapeHtml(j.title || "(no title)")}</a></h4>
        <p>${escapeHtml(j.location || "")}</p>
        <p class="muted">${new Date(j.discovered_at).toLocaleString()} ${j.applied ? "• applied" : ""}</p>
      </div>
      <div class="actions">
        <input type="checkbox" data-id="${j.id}" ${j.applied ? "disabled" : ""}/>
      </div>
    `;
            list.appendChild(div);
        });
    }

    applyBtn.onclick = async () => {
        const ids = [...document.querySelectorAll('input[type="checkbox"]:checked')]
            .map(x => x.getAttribute("data-id"));
        if (!ids.length) return;
        const r = await fetch("/api/apply", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ids})
        });
        const res = await r.json();
        await loadJobs();
        alert(`Applied to ${res.updated} job(s).`);
    };

    function escapeHtml(s) {
        return (s || "").replace(/[&<>"']/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[m]));
    }

    loadJobs();
</script>
</body>
</html>
