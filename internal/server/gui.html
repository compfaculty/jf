<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Job Finder v2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="color-scheme" content="light dark"/>
    <style>
        :root {
            --bg: #0e0e0f;
            --bg-elev: #17181a;
            --fg: #e8e8ea;
            --muted: #9aa0a6;
            --brand: #4caf50;
            --brand-600: #3e8e41;
            --border: #2a2d31;
            --red: #ff5c5c;
            --amber: #f59e0b;
            --focus: #7cc4ff;

            color-scheme: light dark;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #fff;
                --bg-elev: #f7f7f8;
                --fg: #111;
                --muted: #5b5f63;
                --brand: #2ea043;
                --brand-600: #2a8c3b;
                --border: #e7e7ea;
                --focus: #0a84ff;
            }
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
            background: var(--bg);
            color: var(--fg);
        }

        /* Layout */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #111;
            color: #fff;
            border-bottom: 1px solid #0008;
        }

        header .title {
            font-weight: 700;
            letter-spacing: .2px;
        }

        header .sep {
            flex: 1;
        }

        header .link {
            color: inherit;
            opacity: .85;
            text-decoration: none;
        }

        .sidebar-toggle {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 8px;
            font-size: 18px;
            opacity: .85;
            transition: opacity .15s ease;
        }

        .sidebar-toggle:hover {
            opacity: 1;
        }

        .sidebar-toggle:focus-visible {
            box-shadow: 0 0 0 3px color-mix(in oklab, var(--focus) 60%, transparent 40%);
            border-radius: 4px;
        }

        .layout-container {
            display: flex;
            height: calc(100vh - 57px); /* header height */
        }

        .sidebar {
            width: 280px;
            background: var(--bg-elev);
            border-right: 1px solid var(--border);
            transition: transform 0.3s ease, width 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
            flex-shrink: 0;
        }

        .sidebar-collapsed {
            transform: translateX(-100%);
            width: 0;
            border-right: none;
        }

        .sidebar-content {
            padding: 16px;
        }

        .sidebar-title {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--fg);
        }

        .cv-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cv-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease;
            user-select: none;
        }

        .cv-option:hover {
            background: color-mix(in oklab, var(--bg-elev) 85%, white 15%);
        }

        .cv-option input[type="radio"] {
            margin: 0;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--brand);
        }

        .cv-option span {
            flex: 1;
            font-size: 13px;
            color: var(--fg);
            word-break: break-word;
        }

        .cv-option input[type="radio"]:checked + span {
            color: var(--brand);
            font-weight: 500;
        }

        .cv-upload-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .cv-upload-btn {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: inherit;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .cv-upload-btn:hover {
            background: color-mix(in oklab, var(--bg-elev) 85%, white 15%);
            border-color: var(--brand);
        }

        .cv-upload-btn:active {
            transform: translateY(1px);
        }

        .cv-upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cv-upload-status {
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
        }

        .cv-upload-status.success {
            background: color-mix(in oklab, var(--brand) 20%, transparent 80%);
            color: var(--brand);
            border: 1px solid color-mix(in oklab, var(--brand) 40%, transparent 60%);
        }

        .cv-upload-status.error {
            background: color-mix(in oklab, var(--red) 20%, transparent 80%);
            color: var(--red);
            border: 1px solid color-mix(in oklab, var(--red) 40%, transparent 60%);
        }

        main {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            max-width: none;
            transition: margin-left 0.3s ease;
        }

        /* Controls */
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar .grow {
            flex: 1 1 420px;
        }

        .toolbar .muted {
            color: var(--muted);
        }

        .bar {
            height: 10px;
            background: #ddd;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
            border: 1px solid var(--border);
        }

        .bar > div {
            height: 100%;
            width: 0%;
            background: var(--brand);
            transition: width .25s ease;
        }

        .row {
            display: grid;
            grid-template-columns: 28px 2.5fr 1.2fr 1.2fr 1.2fr 140px; /* ☑ | title | company | aggregator | date_posted | status */
            gap: 10px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .row:hover {
            background: color-mix(in oklab, var(--bg) 92%, white 8%);
        }

        .cell {
            min-width: 0;
        }

        .cell.co-loc {
            white-space: normal;
            line-height: 1.4;
        }

        .contact-info {
            font-size: 11px;
            color: var(--brand);
            margin-top: 4px;
            word-break: break-all;
        }

        .ellipsis {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title a {
            text-decoration: none;
            color: inherit;
        }

        .meta-sm {
            font-size: 12px;
            color: var(--muted);
        }

        .right {
            text-align: right;
        }

        .row h4 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
        }

        .row p {
            margin: 0;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: inherit;
            cursor: pointer;
            transition: transform .02s ease-in, filter .15s ease;
        }

        button:hover {
            filter: brightness(1.05);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .primary {
            background: var(--brand);
            border-color: color-mix(in oklab, var(--brand) 80%, black 20%);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-600);
        }

        input[type="search"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-elev);
            color: inherit;
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
        }

        .pager {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pager button {
            padding: 6px 10px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid var(--border);
            background: var(--bg-elev);
        }

        .pill.applied {
            border-color: color-mix(in oklab, var(--brand) 60%, black 40%);
            color: color-mix(in oklab, var(--brand) 85%, white 15%);
        }

        .pill.new {
            border-color: var(--border);
        }

        /* Notifications */
        .toast {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 100;
            max-width: 420px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
        }

        .toast h6 {
            margin: 0 0 4px 0;
            font-size: 13px;
        }

        .toast p {
            margin: 0;
            font-size: 13px;
            color: var(--muted);
        }

        .toast.error {
            border-color: color-mix(in oklab, var(--red) 50%, black 50%);
        }

        /* Hover card */
        .preview-card {
            position: fixed;
            z-index: 99;
            max-width: 520px;
            max-height: 380px;
            overflow: auto;
            padding: 12px 14px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(120, 120, 120, .35);
            pointer-events: none;
            font-size: 13px;
            line-height: 1.35;
            opacity: 0;
            transition: opacity .12s ease;
        }

        @media (prefers-color-scheme: dark) {
            .preview-card {
                background: rgba(30, 30, 30, .95);
                color: #eaeaea;
            }
        }

        @media (prefers-color-scheme: light) {
            .preview-card {
                background: rgba(255, 255, 255, .98);
                color: #111;
            }
        }

        .preview-card h5 {
            margin: 0 0 6px 0;
            font-size: 14px;
        }

        .preview-card p {
            margin: 0 0 8px 0;
        }

        .preview-card ul {
            margin: 0 0 8px 18px;
            padding: 0;
        }

        .preview-card code, .preview-card pre {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            background: rgba(127, 127, 127, .15);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* Utility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* Responsive */
        @media (max-width: 820px) {
            .layout-container {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                top: 57px;
                left: 0;
                height: calc(100vh - 57px);
                z-index: 20;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);
            }

            .sidebar-collapsed {
                transform: translateX(-100%);
            }

            main {
                margin-left: 0;
            }

            .row {
                grid-template-columns: 24px 1fr 1fr;
                grid-auto-rows: auto;
                row-gap: 6px;
            }

            .row .title {
                grid-column: 2 / -1;
            }

            .row .company {
                grid-column: 2 / -1;
            }

            .row .aggregator {
                grid-column: 2 / -1;
            }

            .row .date-posted {
                grid-column: 2 / 3;
            }

            .row .status {
                grid-column: 3 / -1;
                text-align: left;
            }

            .preview-card {
                max-width: 92vw;
                max-height: 50vh;
            }
        }

        /* Focus styles */
        :where(button, a, input[type="checkbox"], input[type="search"]) {
            outline: none;
        }

        :where(button, a, input[type="checkbox"], input[type="search"]):focus-visible {
            box-shadow: 0 0 0 3px color-mix(in oklab, var(--focus) 60%, transparent 40%);
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .16), rgba(255, 255, 255, .08));
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 8px;
            height: 12px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* Real-time job animation */
        .row.job-new {
            animation: slideInPulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideInPulse {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
                box-shadow: 0 0 0 0 color-mix(in oklab, var(--brand) 0%, transparent 100%);
            }
            50% {
                box-shadow: 0 0 20px 4px color-mix(in oklab, var(--brand) 40%, transparent 60%);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                box-shadow: 0 0 0 0 color-mix(in oklab, var(--brand) 0%, transparent 100%);
            }
        }

        .row.job-highlight {
            background: color-mix(in oklab, var(--bg) 85%, var(--brand) 15%);
            transition: background 2.5s ease-out;
        }
    </style>
</head>
<body>
<header>
    <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle CV selection menu" title="Toggle CV selection">
        <span class="sidebar-toggle-icon">☰</span>
    </button>
    <div class="title">Job Finder v2</div>
    <span class="sep"></span>
    <a class="link" href="#" id="helpLink" aria-label="Help">Help</a>
</header>
<div class="layout-container">
    <aside id="sidebar" class="sidebar sidebar-collapsed">
        <div class="sidebar-content">
            <h3 class="sidebar-title">Select CV</h3>
            <div id="cvList" class="cv-list" role="radiogroup" aria-label="CV selection">
                <label class="cv-option">
                    <input type="radio" name="cv" value="" id="cv-none" checked>
                    <span>None (use auto)</span>
                </label>
            </div>
            <div class="cv-upload-section">
                <input type="file" id="cvFileInput" accept=".pdf" style="display: none;">
                <button id="cvUploadBtn" class="cv-upload-btn">Upload CV</button>
                <div id="cvUploadStatus" class="cv-upload-status" style="display: none;"></div>
            </div>
        </div>
    </aside>
    <main>
    <section aria-labelledby="scan-heading">
        <h2 id="scan-heading" class="sr-only">Scanning</h2>
        <div class="toolbar">
            <div class="actions">
                <button id="scanBtn" class="primary" aria-live="polite">Scan</button>
            </div>
            <div id="statusText" class="muted" role="status" aria-live="polite">Idle</div>
            <span class="sep"></span>
            <label class="muted" for="limitSel">Page size</label>
            <select id="limitSel" aria-label="Page size">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
        <div class="bar" aria-hidden="true">
            <div id="barFill"></div>
        </div>
    </section>

    <section style="margin-top:20px;" aria-labelledby="jobs-heading">
        <h2 id="jobs-heading" class="sr-only">Jobs</h2>

        <div class="toolbar">
            <div class="grow">
                <label class="sr-only" for="q">Search</label>
                <input id="q" type="search" placeholder="Search title/description/company/location…" spellcheck="false"
                       autocomplete="off"/>
            </div>
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                <input type="checkbox" id="hideApplied" style="cursor: pointer;"/>
                <span class="muted">Hide applied</span>
            </label>
            <button id="refreshBtn">Refresh</button>
            <button id="latestBtn">Show latest</button>
            <button id="applyBtn" class="primary" disabled>Apply selected</button>
            <button id="deleteBtn" disabled>Delete selected</button>
            <span id="countText" class="muted" aria-live="polite"></span>
        </div>

        <div class="actions" style="margin-top:8px; align-items:center; gap:12px;">
            <label><input type="checkbox" id="selectAll"> <span class="muted">Select all on page</span></label>
            <span id="selCount" class="muted">0 selected</span>
        </div>

        <div id="list" role="list" aria-label="Job results" style="margin-top:8px;"></div>

        <div class="pager">
            <button id="prevBtn">◀ Prev</button>
            <button id="nextBtn">Next ▶</button>
            <span id="pageInfo" class="muted"></span>
        </div>
    </section>
    </main>
</div>

<div id="toast" class="toast" hidden>
    <h6 id="toastTitle"></h6>
    <p id="toastMsg"></p>
</div>

<script>
    // ------- DOM helpers -------
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    const scanBtn = $("#scanBtn");
    const statusText = $("#statusText");
    const barFill = $("#barFill");
    const list = $("#list");
    const q = $("#q");
    const refreshBtn = $("#refreshBtn");
    const latestBtn = $("#latestBtn");
    const applyBtn = $("#applyBtn");
    const deleteBtn = $("#deleteBtn");
    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const pageInfo = $("#pageInfo");
    const countText = $("#countText");
    const selectAll = $("#selectAll");
    const selCount = $("#selCount");
    const limitSel = $("#limitSel");
    const hideApplied = $("#hideApplied");
    const sidebar = $("#sidebar");
    const sidebarToggle = $("#sidebarToggle");
    const cvList = $("#cvList");
    const cvFileInput = $("#cvFileInput");
    const cvUploadBtn = $("#cvUploadBtn");
    const cvUploadStatus = $("#cvUploadStatus");

    // ------- State -------
    let pollTimer = null;
    let limit = Number(localStorage.getItem("jf.limit")) || 25;
    let offset = 0;
    let total = 0;
    let jobsAbort = null; // cancel in-flight /api/jobs
    let sseConnection = null; // SSE EventSource connection
    let selectedCVPath = localStorage.getItem("jf.selected_cv_path") || "";

    // Apply stored page size
    if ([10, 25, 50, 100].includes(limit)) limitSel.value = String(limit);
    else limit = 25;

    // ------- Sidebar Toggle -------
    sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('sidebar-collapsed');
        const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
        localStorage.setItem('jf.sidebar_collapsed', isCollapsed ? 'true' : 'false');
    });

    // Restore sidebar state from localStorage
    const sidebarCollapsed = localStorage.getItem('jf.sidebar_collapsed') === 'true';
    if (sidebarCollapsed) {
        sidebar.classList.add('sidebar-collapsed');
    }

    // ------- CV Selection -------
    async function loadCVList() {
        try {
            const res = await fetchJSON('/api/cv/list');
            const cvs = res.cvs || [];
            
            // Keep "None" option and clear the rest
            const noneOption = document.getElementById('cv-none').closest('.cv-option');
            const noneHTML = noneOption.outerHTML;
            cvList.innerHTML = noneHTML;
            
            // Re-attach change listener for "None" option
            document.getElementById('cv-none').addEventListener('change', () => {
                if (document.getElementById('cv-none').checked) {
                    selectedCVPath = '';
                    localStorage.setItem('jf.selected_cv_path', '');
                }
            });
            
            // Add CV options
            cvs.forEach(cv => {
                const label = document.createElement('label');
                label.className = 'cv-option';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'cv';
                radio.value = cv.path;
                radio.id = `cv-${cv.filename.replace(/[^a-zA-Z0-9]/g, '-')}`;
                const span = document.createElement('span');
                span.textContent = cv.filename;
                label.appendChild(radio);
                label.appendChild(span);
                cvList.appendChild(label);
                
                // Add change listener
                radio.addEventListener('change', () => {
                    if (radio.checked) {
                        selectedCVPath = cv.path;
                        localStorage.setItem('jf.selected_cv_path', selectedCVPath);
                    }
                });
            });
            
            // Set initial selection
            await setInitialCVSelection(cvs);
        } catch (e) {
            console.warn('Failed to load CV list:', e);
            toast('Failed to load CVs', e.message || String(e), true);
        }
    }

    async function setInitialCVSelection(cvs) {
        let cvPathToSelect = '';
        
        // Try to get from config first
        try {
            const configRes = await fetchJSON('/api/config/cv');
            const configPath = (configRes.cv_path || '').trim();
            if (configPath) {
                // Check if config path matches any CV in the list
                const matchedCV = cvs.find(cv => {
                    // Normalize paths for comparison
                    const normalizedConfig = configPath.replace(/\\/g, '/');
                    const normalizedCV = cv.path.replace(/\\/g, '/');
                    return normalizedConfig === normalizedCV || 
                           configPath.endsWith(cv.filename) ||
                           normalizedConfig.endsWith(cv.filename);
                });
                if (matchedCV) {
                    cvPathToSelect = matchedCV.path;
                }
            }
        } catch (e) {
            console.warn('Failed to get CV from config:', e);
        }
        
        // Fallback to localStorage if no config match
        if (!cvPathToSelect && selectedCVPath) {
            const matchedCV = cvs.find(cv => {
                const normalizedSelected = selectedCVPath.replace(/\\/g, '/');
                const normalizedCV = cv.path.replace(/\\/g, '/');
                return normalizedSelected === normalizedCV;
            });
            if (matchedCV) {
                cvPathToSelect = matchedCV.path;
            }
        }
        
        // Select the radio button
        if (cvPathToSelect) {
            // Find radio button by checking all CV radio inputs
            const allCVRadios = cvList.querySelectorAll('input[type="radio"][name="cv"]');
            let found = false;
            for (const radio of allCVRadios) {
                if (radio.value === cvPathToSelect) {
                    radio.checked = true;
                    selectedCVPath = cvPathToSelect;
                    localStorage.setItem('jf.selected_cv_path', selectedCVPath);
                    found = true;
                    break;
                }
            }
            if (!found) {
                // If no match, select "None"
                document.getElementById('cv-none').checked = true;
                selectedCVPath = '';
                localStorage.setItem('jf.selected_cv_path', '');
            }
        } else {
            // Select "None" by default
            document.getElementById('cv-none').checked = true;
            selectedCVPath = '';
            localStorage.setItem('jf.selected_cv_path', '');
        }
    }

    // Load CV list on page load
    loadCVList();

    // ------- CV Upload -------
    cvUploadBtn.addEventListener('click', () => {
        cvFileInput.click();
    });

    cvFileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Validate file type
        if (!file.type.includes('pdf') && !file.name.toLowerCase().endsWith('.pdf')) {
            showUploadStatus('Only PDF files are allowed', 'error');
            cvFileInput.value = ''; // Reset input
            return;
        }

        // Validate file size (10MB limit)
        if (file.size > 10 * 1024 * 1024) {
            showUploadStatus('File size must be less than 10MB', 'error');
            cvFileInput.value = '';
            return;
        }

        // Show uploading state
        cvUploadBtn.disabled = true;
        cvUploadBtn.textContent = 'Uploading...';
        showUploadStatus('Uploading...', 'success');

        try {
            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch('/api/cv/upload', {
                method: 'POST',
                body: formData
            });

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(errorText || `Upload failed: ${res.status}`);
            }

            const data = await res.json();
            showUploadStatus(`Uploaded: ${data.filename}`, 'success');
            
            // Reload CV list and select the newly uploaded CV
            await loadCVList();
            
            // Select the newly uploaded CV
            const allCVRadios = cvList.querySelectorAll('input[type="radio"][name="cv"]');
            for (const radio of allCVRadios) {
                if (radio.value === data.path) {
                    radio.checked = true;
                    selectedCVPath = data.path;
                    localStorage.setItem('jf.selected_cv_path', selectedCVPath);
                    break;
                }
            }

            // Hide success message after 3 seconds
            setTimeout(() => {
                cvUploadStatus.style.display = 'none';
            }, 3000);
        } catch (e) {
            console.error('CV upload error:', e);
            showUploadStatus(e.message || 'Upload failed', 'error');
            // Hide error message after 5 seconds
            setTimeout(() => {
                cvUploadStatus.style.display = 'none';
            }, 5000);
        } finally {
            cvUploadBtn.disabled = false;
            cvUploadBtn.textContent = 'Upload CV';
            cvFileInput.value = ''; // Reset input
        }
    });

    function showUploadStatus(message, type) {
        cvUploadStatus.textContent = message;
        cvUploadStatus.className = `cv-upload-status ${type}`;
        cvUploadStatus.style.display = 'block';
    }

    // ------- Scan -------
    scanBtn.addEventListener('click', async () => {
        try {
            await fetchJSON('/api/scan/start', {method: 'POST'});
            statusText.textContent = 'Starting scan…';
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(pollStatus, 600);
            
            // Open SSE connection for real-time updates
            openSSEConnection();
            
            toast('Scan started', 'The scanner is running.');
        } catch (e) {
            toast('Failed to start scan', e.message || String(e), true);
        }
    });

    // ------- SSE Real-time Updates -------
    function openSSEConnection() {
        // Close existing connection if any
        closeSSEConnection();
        
        // Only connect if on page 1 with no search filter and hide applied is off (real-time updates only for main view)
        if (offset !== 0 || q.value.trim() !== '' || hideApplied.checked) {
            return; // Don't stream if user is on a different page, has a search, or is hiding applied
        }
        
        sseConnection = new EventSource('/api/scan/stream');
        
        sseConnection.addEventListener('job_found', (e) => {
            try {
                const job = JSON.parse(e.data);
                handleNewJob(job);
            } catch (err) {
                console.warn('SSE: failed to parse job_found event', err);
            }
        });
        
        sseConnection.addEventListener('scan_status', (e) => {
            try {
                const status = JSON.parse(e.data);
                // Update status if needed (we already poll, but this is real-time)
                if (status.running) {
                    barFill.style.width = (status.percent || 0) + '%';
                }
            } catch (err) {
                console.warn('SSE: failed to parse scan_status event', err);
            }
        });
        
        sseConnection.addEventListener('scan_complete', (e) => {
            try {
                const result = JSON.parse(e.data);
                closeSSEConnection();
                // Reload jobs to get final state
                loadJobs();
                toast('Scan complete', `Found ${result.total_found} new job(s) in ${Math.round(result.duration_seconds)}s.`);
            } catch (err) {
                console.warn('SSE: failed to parse scan_complete event', err);
            }
        });
        
        sseConnection.onerror = (err) => {
            console.warn('SSE connection error', err);
            // Don't auto-reconnect if scan is not running
            if (!pollTimer) {
                closeSSEConnection();
            }
        };
    }
    
    function closeSSEConnection() {
        if (sseConnection) {
            sseConnection.close();
            sseConnection = null;
        }
    }
    
    function handleNewJob(job) {
        // Only update UI if on page 1 with no search filter and hide applied is off
        if (offset !== 0 || q.value.trim() !== '' || hideApplied.checked) {
            return;
        }
        
        // Prepend new job to the list
        const row = createJobRow(job);
        
        // Add animation classes
        row.classList.add('job-new', 'job-highlight');
        
        // Insert at the top of the list
        const listEl = $("#list");
        if (listEl.children.length === 0 || listEl.querySelector('.muted')) {
            listEl.innerHTML = ''; // Clear "No jobs yet" message if present
        }
        
        listEl.insertBefore(row, listEl.firstChild);
        
        // Remove animation class after animation completes
        setTimeout(() => {
            row.classList.remove('job-new');
        }, 600);
        
        // Remove highlight class after fade completes
        setTimeout(() => {
            row.classList.remove('job-highlight');
        }, 2500);
        
        // Update total count
        total++;
        updatePager();
        
        // Update selection state (new jobs are not selected)
        updateSelectionState();
    }
    
    function createJobRow(j) {
        const applied = !!j.applied;
        const statusIcon = applied ? '✅' : '🆕';
        const url = j.url || '';
        const descHTML = formatDesc(j.description || '');
        
        // Format PostedAt if available
        let datePosted = '';
        if (j.posted_at) {
            try {
                const postedDate = new Date(j.posted_at);
                if (!isNaN(postedDate.getTime())) {
                    datePosted = postedDate.toLocaleDateString();
                }
            } catch (e) {
                datePosted = j.posted_at;
            }
        }
        
        const row = document.createElement('div');
        row.className = 'row';
        row.role = 'listitem';
        row.innerHTML = `
        <div class="cell">
          <input type="checkbox" title="Select" data-id="${j.id}" ${applied ? 'disabled' : ''} />
        </div>
        <div class="cell title ellipsis">
          <h4>${statusIcon} <a href="${url}" target="_blank" rel="noopener" class="job-link">${escapeHtml(j.title || '(no title)')}</a></h4>
        </div>
        <div class="cell company meta-sm">
          ${j.company_name ? `🏢 ${escapeHtml(j.company_name)}` : ''}
        </div>
        <div class="cell aggregator meta-sm">
          ${j.aggregator_name ? `📌 ${escapeHtml(j.aggregator_name)}` : ''}
        </div>
        <div class="cell date-posted meta-sm">
          ${datePosted ? `📅 ${escapeHtml(datePosted)}` : ''}
        </div>
        <div class="cell status right">
          ${applied ? `<span class="pill applied">Applied</span>` : `<span class="pill new">Not applied</span>`}
        </div>`;
        
        // Preview hover
        const link = row.querySelector('.job-link');
        attachPreview(link, {
            title: j.title || '(no title)',
            company: j.company_name || '',
            location: j.location || '',
            hrEmail: j.hr_email || '',
            hrPhone: j.hr_phone || '',
            descHTML
        });
        
        // Checkbox selection listener
        const cb = row.querySelector('input[type="checkbox"]');
        cb.addEventListener('change', updateSelectionState);
        
        return row;
    }

    async function pollStatus() {
        try {
            const st = await fetchJSON('/api/scan/status');
            barFill.style.width = (st.percent || 0) + '%';
            let txt = st.running ? `🔎 Scanning: ${st.percent}% (${st.found} new)` : `Idle: ${st.percent}% (${st.found} new)`;
            if (st.error) txt += ` — error: ${st.error}`;
            statusText.textContent = txt;
            if (!st.running && pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
                closeSSEConnection(); // Close SSE when scan completes
                await loadJobs();
            }
        } catch (e) {
            // Don’t spam errors; pause polling briefly
            console.warn('pollStatus error', e);
        }
    }

    // ------- Paging & Search -------
    // Deep-link search from URL - declare urlParams before event listeners
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.has('q')) q.value = urlParams.get('q');

    limitSel.addEventListener('change', () => {
        limit = Number(limitSel.value) || 25;
        localStorage.setItem('jf.limit', String(limit));
        offset = 0;
        loadJobs();
    });

    refreshBtn.addEventListener('click', () => {
        offset = 0;
        closeSSEConnection(); // Close SSE when manually refreshing
        loadJobs();
    });
    latestBtn.addEventListener('click', () => {
        q.value = '';
        urlParams.delete('q');
        syncQueryToURL(); // Update browser URL to reflect cleared search
        offset = 0;
        loadJobs();
        toast('Showing latest', 'Cleared search and loaded newest jobs.');
    });
    prevBtn.addEventListener('click', () => {
        offset = Math.max(0, offset - limit);
        closeSSEConnection(); // Close SSE when navigating pages
        loadJobs();
    });
    nextBtn.addEventListener('click', () => {
        if (offset + limit < total) {
            offset += limit;
            closeSSEConnection(); // Close SSE when navigating pages
            loadJobs();
        }
    });

    const debounce = (fn, ms = 250) => {
        let t;
        return (...a) => {
            clearTimeout(t);
            t = setTimeout(() => fn(...a), ms);
        };
    };

    hideApplied.addEventListener('change', () => {
        offset = 0;
        closeSSEConnection(); // Close SSE when filtering (real-time only for unfiltered view)
        loadJobs();
    });

    q.addEventListener('input', debounce(() => {
        offset = 0;
        syncQueryToURL();
        closeSSEConnection(); // Close SSE when searching (real-time only for unfiltered view)
        loadJobs();
    }, 250));
    q.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            offset = 0;
            syncQueryToURL();
            loadJobs();
        }
    });

    function syncQueryToURL() {
        const u = new URL(location.href);
        const v = q.value.trim();
        if (v) u.searchParams.set('q', v); else u.searchParams.delete('q');
        history.replaceState(null, '', u.toString());
    }

    // ------- Load Jobs -------
    async function loadJobs() {
        selectAll.checked = false; // reset select all
        updateSelectionState();

        // Skeleton while loading
        renderSkeletonRows();

        const params = new URLSearchParams();
        const qv = q.value.trim();
        if (qv) params.set('q', qv);
        if (hideApplied.checked) params.set('hide_applied', 'true');
        params.set('limit', String(limit));
        params.set('offset', String(offset));

        if (jobsAbort) jobsAbort.abort();
        jobsAbort = new AbortController();

        try {
            const res = await fetchJSON('/api/jobs?' + params.toString(), {signal: jobsAbort.signal});
            total = res.total || 0;
            limit = res.limit || limit;
            offset = res.offset || offset;
            renderJobs(Array.isArray(res.items) ? res.items : []);
            updatePager();
        } catch (err) {
            if (err?.name !== 'AbortError') {
                console.error('loadJobs failed:', err);
                toast('Failed to load jobs', err.message || String(err), true);
                list.innerHTML = `<p class="muted">Couldn’t load jobs.</p>`;
            }
        }
    }

    function updatePager() {
        const page = Math.floor(offset / limit) + 1;
        const pages = Math.max(1, Math.ceil(total / limit));
        pageInfo.textContent = `Page ${page} / ${pages}`;
        countText.textContent = `Total: ${total}`;
        prevBtn.disabled = offset <= 0;
        nextBtn.disabled = offset + limit >= total;
    }

    // ------- Rendering -------
    function renderSkeletonRows(n = 6) {
        list.innerHTML = '';
        for (let i = 0; i < n; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
        <div><div class="skeleton" style="width:18px; height:18px; border-radius:6px;"></div></div>
        <div class="cell"><div class="skeleton" style="width:70%;"></div></div>
        <div class="cell"><div class="skeleton" style="width:60%;"></div></div>
        <div class="cell"><div class="skeleton" style="width:50%;"></div></div>
        <div class="cell"><div class="skeleton" style="width:40%;"></div></div>
        <div class="cell right"><div class="skeleton" style="width:90px; height:22px; margin-left:auto; border-radius:999px;"></div></div>`;
            list.appendChild(row);
        }
    }

    function renderJobs(jobs) {
        list.innerHTML = '';
        if (!jobs.length) {
            list.innerHTML = `<p class="muted">No jobs yet.</p>`;
            return;
        }

        const frag = document.createDocumentFragment();

        for (const j of jobs) {
            const row = createJobRow(j);
            frag.appendChild(row);
        }

        list.appendChild(frag);
    }

    // ------- Bulk actions -------
    applyBtn.addEventListener('click', async () => {
        const ids = selectedIDs();
        if (!ids.length) return;
        try {
            const body = {ids};
            // Include CV path if one is selected (not "None")
            if (selectedCVPath && selectedCVPath.trim() !== '') {
                body.cv_path = selectedCVPath;
            }
            const res = await fetchJSON('/api/apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            await loadJobs();
            const cvMsg = selectedCVPath ? ` (using ${selectedCVPath.split('/').pop()})` : '';
            toast('Applied', `Applied to ${res.updated ?? ids.length} job(s)${cvMsg}.`);
        } catch (e) {
            toast('Apply failed', e.message || String(e), true);
        }
    });

    deleteBtn.addEventListener('click', async () => {
        const ids = selectedIDs(true);
        if (!ids.length) return;
        if (!confirm(`Delete ${ids.length} job(s)? This cannot be undone.`)) return;
        try {
            const res = await fetchJSON('/api/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ids})
            });
            await loadJobs();
            toast('Deleted', `Deleted ${res.deleted ?? ids.length} job(s).`);
        } catch (e) {
            toast('Delete failed', e.message || String(e), true);
        }
    });

    function selectedIDs(includeApplied = false) {
        const boxes = $$('#list input[type="checkbox"]');
        const sel = [];
        for (const b of boxes) {
            if (b.checked || (includeApplied && b.disabled)) {
                const id = b.getAttribute('data-id');
                if (id) sel.push(id);
            }
        }
        return sel;
    }

    selectAll.addEventListener('change', () => {
        const boxes = $$('#list input[type="checkbox"]:not(:disabled)');
        for (const b of boxes) b.checked = selectAll.checked;
        updateSelectionState();
    });

    function updateSelectionState() {
        const boxes = $$('#list input[type="checkbox"]');
        const enabled = boxes.filter(b => !b.disabled);
        const checked = enabled.filter(b => b.checked);
        const applied = boxes.filter(b => b.disabled);

        selCount.textContent = `${checked.length} selected`;
        applyBtn.disabled = checked.length === 0;

        const allChecked = enabled.length > 0 && checked.length === enabled.length;
        selectAll.indeterminate = checked.length > 0 && !allChecked;
        selectAll.checked = allChecked;

        // Delete is allowed when there are checked items or applied jobs (disabled checkboxes)
        deleteBtn.disabled = checked.length === 0 && applied.length === 0;
    }

    // ------- Preview hover card -------
    let previewEl = null;
    let hideTimer = null;

    // Add scroll listener once globally (not per job link)
    window.addEventListener('scroll', hidePreviewSoon, {passive: true});

    function attachPreview(target, data) {
        target.addEventListener('mouseenter', e => showPreview(e, data));
        target.addEventListener('mousemove', e => movePreview(e));
        target.addEventListener('mouseleave', hidePreviewSoon);
    }

    function showPreview(e, {title, company, location, hrEmail, hrPhone, descHTML}) {
        clearTimeout(hideTimer);
        if (!previewEl) {
            previewEl = document.createElement('div');
            previewEl.className = 'preview-card';
            document.body.appendChild(previewEl);
        }
        const heading = `<h5>${escapeHtml(title)}</h5>`;
        const meta = (company || location) ? `<p class="meta-sm" style="margin-bottom:8px;">${escapeHtml(company)}${company && location ? ' • ' : ''}${escapeHtml(location)}</p>` : '';
        let contact = '';
        if (hrEmail) contact += `<p class="meta-sm" style="margin-bottom:8px; color: var(--brand);">✉ <a href="mailto:${escapeHtml(hrEmail)}" style="color: inherit; text-decoration: underline;">${escapeHtml(hrEmail)}</a></p>`;
        if (hrPhone) contact += `<p class="meta-sm" style="margin-bottom:8px; color: var(--brand);">📞 <a href="tel:${escapeHtml(hrPhone)}" style="color: inherit; text-decoration: underline;">${escapeHtml(hrPhone)}</a></p>`;
        previewEl.innerHTML = heading + meta + contact + descHTML;
        movePreview(e);
        previewEl.style.opacity = '1';
    }

    function movePreview(e) {
        if (!previewEl) return;
        const pad = 14;
        const vw = innerWidth, vh = innerHeight;
        const rect = previewEl.getBoundingClientRect();
        let x = e.clientX + pad, y = e.clientY + pad;
        if (x + rect.width + 10 > vw) x = e.clientX - rect.width - pad;
        if (y + rect.height + 10 > vh) y = e.clientY - rect.height - pad;
        if (x < 8) x = 8;
        if (y < 8) y = 8;
        previewEl.style.left = x + 'px';
        previewEl.style.top = y + 'px';
    }

    function hidePreviewSoon() {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            if (previewEl) previewEl.style.opacity = '0';
        }, 80);
    }

    // ------- Networking & utilities -------
    async function fetchJSON(url, opts) {
        const r = await fetch(url, opts);
        if (!r.ok) {
            const text = await r.text().catch(() => '');
            const msg = text || `${r.status} ${r.statusText}`;
            throw new Error(msg);
        }
        const ct = r.headers.get('content-type') || '';
        if (ct.includes('application/json')) return r.json();
        return r.text();
    }

    function shortUrl(u, max = 36) {
        if (!u) return '';
        try {
            const url = new URL(u);
            let text = url.host + url.pathname.replace(/\/+$/, '');
            if (!text) text = url.host;
            if (text.length > max) {
                const keep = Math.max(6, Math.floor(max * 0.55));
                const end = Math.max(8, max - keep - 1);
                text = text.slice(0, keep) + '…' + text.slice(-end);
            }
            return text;
        } catch {
            return u.length > max ? u.slice(0, max - 1) + '…' : u;
        }
    }

    function ago(d) {
        const s = Math.floor((Date.now() - d.getTime()) / 1000);
        if (s < 60) return `${s}s`;
        const m = Math.floor(s / 60);
        if (m < 60) return `${m}m`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h}h`;
        const days = Math.floor(h / 24);
        if (days < 30) return `${days}d`;
        const mo = Math.floor(days / 30);
        return `${mo}mo`;
    }

    function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[m]));
    }

    function formatDesc(raw) {
        const esc = escapeHtml(raw).trim();
        if (!esc) return `<p class="muted">No description.</p>`;
        const blocks = esc.split(/\n{2,}/);
        const html = blocks.map(b => {
            const lines = b.split(/\n/).map(s => s.trim()).filter(Boolean);
            const allBullets = lines.length > 1 && lines.every(l => /^[-*•]\s*/.test(l));
            if (allBullets) {
                const li = lines.map(l => `<li>${l.replace(/^[-*•]\s*/, '')}</li>`).join('');
                return `<ul>${li}</ul>`;
            }
            return `<p>${lines.join('<br/>')}</p>`;
        }).join('');
        return html;
    }

    function toast(title, msg, isError = false) {
        const el = $('#toast');
        const t = $('#toastTitle');
        const m = $('#toastMsg');
        t.textContent = title;
        m.textContent = msg;
        el.classList.toggle('error', !!isError);
        el.hidden = false;
        el.style.opacity = '1';
        clearTimeout(el._t);
        el._t = setTimeout(() => {
            el.style.opacity = '0';
            setTimeout(() => el.hidden = true, 200);
        }, 3500);
    }

    // Initial load
    loadJobs();

    // Accessibility: allow / to focus search
    window.addEventListener('keydown', (e) => {
        if (e.key === '/' && !/INPUT|TEXTAREA/.test(document.activeElement.tagName)) {
            e.preventDefault();
            q.focus();
        }
    });
</script>
